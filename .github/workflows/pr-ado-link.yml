name: PR ↔ ADO Link
on:
  pull_request:
    types: [opened, reopened, closed]

jobs:
  link-ado:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link PR to ADO work items
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: python .github/scripts/pr_ado_link.py
